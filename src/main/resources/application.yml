#Human Resource Management System and Payroll system
server:
  port: 8090
spring:
  application:
    name: Hrms

  #Database connection
  datasource:
    url: jdbc:mysql://localhost:3306/Hrmsdb
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
      database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: admin
      password: admin
